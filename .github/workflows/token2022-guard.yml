name: Token2022 Guard

on:
  push:
    branches: [main]
  pull_request:

jobs:
  token2022-safety:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Token2022 Guard scan (negative control)
        run: npm run scan -- ./examples/secure_hook.rs --fail-on=high

      - name: Token2022 Guard scan (example corpus)
        run: npm run scan -- ./examples

      - name: Generate SARIF
        if: always()
        run: npx tsx cli/index.ts ./examples --sarif > token2022-guard.sarif

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: token2022-guard.sarif
